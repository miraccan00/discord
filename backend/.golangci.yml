# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  concurrency: 4

linters:
  disable-all: true
  enable:
    # ── Bug detection & type safety ───────────────────────────────
    - govet
    - staticcheck
    - errcheck
    - unused
    - ineffassign
    - copyloopvar

    # ── Code quality & idioms ─────────────────────────────────────
    - revive
    - gocritic

    # ── Security ─────────────────────────────────────────────────
    - gosec
    - bidichk

    # ── Resource safety ──────────────────────────────────────────
    - bodyclose

    # ── Formatting & style ───────────────────────────────────────
    - gofmt
    - goimports
    - whitespace
    - lll

    # ── Performance ───────────────────────────────────────────────
    - prealloc
    - perfsprint
    - durationcheck

    # ── Validation & conventions ──────────────────────────────────
    - errchkjson
    - unconvert
    - usestdlibvars
    - nilerr
    - nolintlint
    - misspell

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      disable-default-exclusions: false

    revive:
      ignore-generated-header: true
      severity: warning
      enable-all-rules: false
      rules:
        - name: error-return
        - name: error-naming
        - name: receiver-naming
        - name: var-naming
          arguments:
            - - "ID"
              - "HTTP"
              - "HTTPServer"
              - "API"
              - "URL"
              - "UUID"
              - "CIDR"
              - "TCP"
              - "UDP"
              - "DNS"
              - "gRPC"
              - "TLS"
              - "SHA"
              - "MD5"
        - name: indent-error-flow
        - name: defer
        - name: early-return
        - name: range
        - name: exported

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - singleCaseSwitch

    lll:
      line-length: 120
      tab-width: 4

    gofmt:
      simplify: true

    staticcheck:
      checks:
        - "all"
        - "-SA9003"
        - "-SA1019"

    gosec:
      confidence: medium
      severity: medium
      includes:
        - G101
        - G102
        - G103
        - G104
        - G107
        - G201
        - G301
        - G302
        - G304
        - G305
        - G401
        - G402
        - G403
        - G501
        - G502
        - G503
        - G601

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: ".*\\.pb\\.go"
      linters: [revive, gocritic, gosec]

    - path: ".*_gen\\.go"
      linters: [revive, gocritic]

    - path: ".*_mock\\.go"
      linters: [revive, gocritic]

    - path: "_test\\.go"
      linters: [errcheck, gosec, gocritic]

    - path: "_bench\\.go"
      linters: [errcheck]

    - path: "cmd/.*\\.go"
      linters: [errcheck]
      text: "os.Exit"

    - path: "cmd/.*\\.go"
      linters: [gosec]
      text: "hardcoded"

    - path: ".*_test\\.go"
      linters: [gosec]
      text: "G404"

  exclude:
    - "^G104:"

output:
  formats:
    - format: colored-tab
    - format: json
      path: golangci-lint-report.json
  show-statistics: true
