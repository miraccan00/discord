apiVersion: v1
kind: Service
metadata:
  name: {{ include "discord.frontend.fullname" . }}
  labels:
    {{- include "discord.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "discord.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
