server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback. /api and /ws are NOT proxied here — the Kubernetes
    # ingress routes those paths to the backend service.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
